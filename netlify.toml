[build]
  # Build command
  command = "npm run build"
  
  # Directory to publish
  publish = "dist"
  
  # Functions directory
  functions = "netlify/functions"

# Local dev: Netlify on :8888 (functions + redirects) → Vite on :5173
[dev]
  command = "npx vite"
  targetPort = 5173
  port = 8888
  publish = "dist"
  autoLaunch = false

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]

[build.environment]
  # Node.js version
  NODE_VERSION = "18"

# Redirect rules (backup for _redirects file)

[[redirects]]
  from = "/api/practice-patterns"
  to = "/.netlify/functions/practice-patterns"
  status = 200

[[redirects]]
  from = "/api/build-daily-pattern"
  to = "/.netlify/functions/build-daily-pattern"
  status = 200

[[redirects]]
  from = "/api/dig-day"
  to = "/.netlify/functions/dig-day"
  status = 200

[[redirects]]
  from = "/api/practice-runs"
  to = "/.netlify/functions/practice-runs"
  status = 200

[[redirects]]
  from = "/api/admin-blobs"
  to = "/.netlify/functions/admin-blobs"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    # X-Frame-Options = "DENY"  # Commented out to allow iframing
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Headers for API routes
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization, x-admin-password"
    Access-Control-Allow-Methods = "GET, POST, DELETE, OPTIONS"

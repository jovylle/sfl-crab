[build]
  # Build command
  command = "npm run build"
  
  # Directory to publish
  publish = "dist"
  
  # Functions directory
  functions = "netlify/functions"

[build.environment]
  # Node.js version
  NODE_VERSION = "18"

# Redirect rules (backup for _redirects file)

[[redirects]]
  from = "/api/practice-patterns"
  to = "/.netlify/functions/practice-patterns"
  status = 200

[[redirects]]
  from = "/api/build-daily-pattern"
  to = "/.netlify/functions/build-daily-pattern"
  status = 200

[[redirects]]
  from = "/api/dig-day"
  to = "/.netlify/functions/dig-day"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    # X-Frame-Options = "DENY"  # Commented out to allow iframing
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Headers for API routes
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
